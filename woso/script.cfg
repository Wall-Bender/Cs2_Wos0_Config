// [1] HIZLI BOMBA BIRAKMA (QUICK BOMB DROP)
// C4'u eline alip baska silaha gecmeye gerek kalmadan aninda yere atar.
alias "+bomb-drop" "slot3; slot5"
alias "-bomb-drop" "drop; lastinv"

// [2] HIZLI KONSOL KISAYOLLARI (CONSOLE SHORTCUTS)
// Konsola uzun komutlar yazmak yerine tek harfle islem yapmanizi saglar.
alias "d" "disconnect"            // Sunucudan cikis yapar.
alias "q" "quit"                  // Oyunu tamamen kapatir.
alias "r" "retry"                 // Son baglanilan sunucuya tekrar baglanir.
alias "rs" "mp_restartgame 1"     // Antrenman modunda maci sifirlar.
alias "c" "clear"                 // Konsol ekranini temizler.

// [3] SES EFEKTLİ TEMİZLEYİCİ (FIXER)
// Ekrandaki kan izlerini siler, konsolu temizler ve onay sesi calar.
alias "fix" "clear; play sounds/ui/beepclear"

// [4] DIRECTOR'S HEART ART (CS2 COMPATIBLE)
// Konsola 'woso_heart' yazildiginda cikan ozel Wos0 imzali kalp gorseli.
alias "h1" "echo "
alias "h2" "echo           xxxxxx           xxxxxx"
alias "h3" "echo         xxxxxxxxxx       xxxxxxxxxx"
alias "h4" "echo       xxxxxxxxxxxxxx   xxxxxxxxxxxxxx"
alias "h5" "echo      xxxxxxxxxxxxxxxx xxxxxxxxxxxxxxxx"
alias "h6" "echo      xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
alias "h7" "echo       xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
alias "h8" "echo         xxxxxxxxxxxxxxxxxxxxxxxxxxx"
alias "h9" "echo           xxxxxxxxxxxxxxxxxxxxxxx"
alias "h10" "echo            xxxxxxxxxxxxxxxxxxxxx"
alias "h11" "echo              xxxxxxxxxxxxxxxxx"
alias "h12" "echo                xxxxxxxxxxxxx"
alias "h13" "echo                  xxxxxxxxx"
alias "h14" "echo                    xxxxx"
alias "h15" "echo                      x"
alias "h16" "echo "
alias "h17" "echo      >>> DIRECTOR WOS0 IS HERE <<<"

alias "heart_print" "h1; h2; h3; h4; h5; h6; h7; h8; h9; h10; h11; h12; h13; h14; h15; h16; h17"
alias "woso_heart" "heart_print; play sounds/player/winter/snowball_throw_02.wav"

// [5] DIRECTOR'S FAST SPIN (MEVLANA MODE - ULTRA FAST)
// Senin belirttigin 'yaw -9230 1 1' komutu ile 360 derece donusleri cok daha hizli atar.
// Mouse tekerlegini asagi kaydirinca aktif olur, tekrar kaydirinca durur.
alias "woso_spin" "spin_on"
alias "spin_on" "yaw -9230 1 1; alias woso_spin spin_off; play sounds/ui/panorama/sidemenu_rollover_02.wav"
alias "spin_off" "yaw 0 0 0; alias woso_spin spin_on; play sounds/ui/beepclear"

echo ">>> WOS0 Custom Scripts & Art Loaded <<<"