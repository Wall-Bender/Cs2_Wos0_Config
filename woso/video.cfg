// ##########################################################
// ##             WOS0 - VIDEO & FPS CONFIG                ##
// ##########################################################

// [1] FPS LİMİTLERİ (FRAME LIMITS)
fps_max "0"                       // Oyun ici FPS limiti (0: Sinirsiz - En dusuk gecikme saglar)
fps_max_ui "120"                  // Ana menu FPS limiti (Menude PC'yi isitmaya gerek yok)
fps_max_tools "120"               // Arka plan FPS limiti

// [2] GÖRÜNTÜ VE PARLAKLIK (VISUALS)
r_fullscreen_gamma "2.2"          // Ekran parlakligi (Karanlik koseleri gormek istersen 1.8 veya 2.0 yapabilirsin)

// [3] MOTOR, İŞLEMCİ VE GECİKME (ENGINE, CPU & LATENCY)
// CS2'nin yeni motoruna islemciyi en verimli kullandiran kodlar:
thread_pool_option "2"            // Islemcinin (varsa) 'Performans' cekirdeklerine oncelik verir
engine_low_latency_sleep_after_client_tick "1" // NVIDIA Reflex ile calisarak input lag'i en aza indirir
engine_no_focus_sleep "50"        // Alt-Tab attiginda oyunu uykuya alip PC'yi rahatlatir (0 yaparsan Alt-Tab'da da tam guc calisir)

echo ">>> WOS0 Video & Performance Settings Loaded <<<"