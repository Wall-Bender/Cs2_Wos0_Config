// ##########################################################
// ##           WOS0 - ADVANCED CROSSHAIR CONFIG           ##
// ##########################################################

// [1] TEMEL NİŞANGAH (CORE CROSSHAIR)
crosshair "1"
cl_crosshairstyle "4"             // 4: Tamamen Sabit (Hareket edince buyumez)
cl_crosshairsize "2.3"            // Cizgi uzunlugu
cl_crosshairthickness "0.5"       // Cizgi kalinligi
cl_crosshairgap "-3"              // Ortadaki bosluk (Eksi degerler cizgileri yakinlastirir)
cl_fixedcrosshairgap "-2"
cl_crosshairdot "0"               // Orta nokta (0: Kapali, Gorus acisini ferahlatir)
cl_crosshair_t "0"                // T seklinde nisangah (0: Kapali)
cl_crosshair_recoil "0"           // Mermi sekmesini (Spray) takip etme (0: Kapali)
cl_crosshairgap_useweaponvalue "0"// Silaha gore bosluk degistirme (0: Kapali)

// [2] RENK VE GÖRÜNÜRLÜK (COLOR & VISIBILITY)
cl_crosshaircolor "1"             // 1: Standart Yesil
cl_crosshaircolor_R "0"           // Eger color 5 yaparsan bu RGB kodlari gecerli olur
cl_crosshaircolor_G "255"
cl_crosshaircolor_B "0"
cl_crosshairalpha "250"           // Saydamlik (255 tam canli renk)
cl_crosshairusealpha "1"
cl_crosshair_drawoutline "0"      // Dis siyah cizgi (0: Kapali - Daha ince gorunum)
cl_crosshair_outlinethickness "2" // Dis cizgi kalinligi (Acik olursa)
cl_crosshair_friendly_warning "1" // Takim arkadasina nisan alinca cikan engel isareti
hud_showtargetid "1"              // Nisangah ustundeki dusman ismini goster

// [3] KESKİN NİŞANCI (SNIPER & SCOPE)
cl_crosshair_sniper_width "1"     // AWP ve Scout acikkenki cizgi kalinligi
cl_ironsight_filter_alpha "0"     // AUG/SG553 Durbun karartmasi (0: En temiz goruntu)
cl_ironsight_min_channel_color "0"
cl_ironsight_usecrosshaircolor "0"

// [4] BOMBA HİZALAMA NİŞANGAHI (CS2 GRENADE CROSSHAIR)
// CS2'nin yeni ozelligi: Bomba pimini cektiginde ekranin tamamini kaplayan hiza cizgileri cikar.
cl_grenadecrosshair_keepusercrosshair "0" // Ozel bomba cizgilerini kullan
cl_grenadecrosshair_explosive "1" // HE Bomba icin acik
cl_grenadecrosshair_fire "1"      // Molotof icin acik
cl_grenadecrosshair_flash "1"     // Flashbang icin acik
cl_grenadecrosshair_smoke "1"     // Smoke icin acik (Taktiksel smoke'lar icin sart)
cl_grenadecrosshair_decoy "0"     // Decoy icin kapali
cl_grenadecrosshairdelay_explosive "2"
cl_grenadecrosshairdelay_fire "2"
cl_grenadecrosshairdelay_flash "2"
cl_grenadecrosshairdelay_smoke "2"

// Gereksiz Animasyon Ayarları (Sabit crosshair kullanildigi icin sifirlandi)
cl_crosshair_dynamic_maxdist_splitratio "2"
cl_crosshair_dynamic_splitalpha_innermod "0"
cl_crosshair_dynamic_splitalpha_outermod "1"
cl_crosshair_dynamic_splitdist "3"

echo ">>> WOS0 Advanced Crosshair Settings Loaded <<<"