// ##########################################################
// ##             WOS0 - BINDS & CONTROLS CONFIG           ##
// ##########################################################

// [1] TEMEL AYARLAR
unbindall
key_updatelayout
cl_input_enable_raw_keyboard "0"
input_button_code_is_scan_code_scd "1" // Scancode (Fiziksel tus atamasi) aktif

// [2] HAREKET (MOVEMENT)
bind "scancode4"      "+left"          // [A] Sola git
bind "scancode7"      "+right"         // [D] Saga git
bind "scancode22"     "+back"          // [S] Geri git
bind "scancode26"     "+forward"       // [W] Ileri git
bind "scancode224"    "+duck"          // [CTRL] Egil
bind "scancode44"     "+jump"          // [SPACE] Zipla
bind "mwheelup"       "+jump"          // Mouse Tekerlegi Yukari - Zipla
bind "mwheeldown"     "woso_spin"      // Mouse Tekerlegi Asagi - Hizli Donus (Mevlana)
bind "mouse_x"        "yaw"            // Fare ekseni (Saga/Sola bakma)
bind "mouse_y"        "pitch"          // Fare ekseni (Yukari/Asagi bakma)

// --- PRO TAKTIK: SES YUKSELTEN YURUYUS (WALK BOOST) ---
// Shift'e basinca oyunun genel sesini artirir (Ayak seslerini daha iyi duyarsin)
alias "+walk_boost" "+sprint; volume 1.1" 
alias "-walk_boost" "-sprint; volume 0.8"
bind "scancode225" "+walk_boost"       // [SHIFT] Yuru (Sessiz ve Yuksek Sesli)

// [3] EYLEM VE SILAH (ACTION & WEAPONS)
bind "scancode30"     "slot1"          // [1] Birinci Silah (Tufek)
bind "scancode31"     "slot2"          // [2] Ikinci Silah (Tabanca)
bind "scancode32"     "slot3"          // [3] Bicak
bind "scancode33"     "slot4"          // [4] Bombalar (Gecis)
bind "scancode34"     "slot5"          // [5] C4 (Bomba)
bind "mouse1"         "+attack"        // Ates et
bind "mouse2"         "+attack2"       // Zoom ac / Susturucu cikar
bind "scancode21"     "+reload"        // [R] Sarjor degistir
bind "scancode10"     "drop"           // [G] Silah at
bind "scancode8"      "+use"           // [E] Kullan / Bomba coz
bind "scancode5"      "buymenu"        // [B] Satin alma menusu
bind "scancode9"      "+lookatweapon"  // [F] Silahi incele
bind "scancode20"     "lastinv"        // [Q] Son silaha gec
bind "scancode54"     "switchhands"    // [,] Silahi sol/sag ele al

// --- PRO TAKTIK: HIZLI BOMBA CEKME ---
bind "mouse4"         "slot7"          // [Mouse Geri Tusu] Aninda Flashbang
bind "mouse5"         "slot8"          // [Mouse Ileri Tusu] Aninda Smoke

// [4] ILETISIM VE ARAYUZ (COMMUNICATION & UI)
bind "scancode25"     "+voicerecord"   // [V] Bas-Konus Mikrofon
bind "scancode24"     "messagemode2"   // [Y] Takim chati
bind "scancode28"     "messagemode"    // [U] Genel chat
bind "scancode43"     "+showscores"    // [TAB] Skor tablosu
bind "scancode53"     "toggleconsole"  // [`/é] Konsolu ac

// --- PRO TAKTIK: CLUTCH MODU (TAKIMI SUSTUR) ---
alias "clutch_on" "voice_modenable 0; play sounds/ui/beepclear; alias clutch_mode clutch_off"
alias "clutch_off" "voice_modenable 1; play sounds/ui/panorama/sidemenu_rollover_02.wav; alias clutch_mode clutch_on"
alias "clutch_mode" "clutch_on"
bind "scancode14" "clutch_mode"        // [K] Tek tusla takimi sustur/ac

// [5] NUMPAD HIZLI SATIN ALMA (QUICK BUY)
bind "scancode84"     "buy hegrenade"    // [/] HE Bomba
bind "scancode85"     "buy flashbang"    // [*] Flashbang
bind "scancode86"     "buy smokegrenade" // [-] Smoke
bind "scancode87"     "buy incgrenade"   // [+] Molotov
bind "scancode88"     "buy defuser"      // [ENTER] Defuse Kit
bind "scancode99"     "buy vest"         // [.] Çelik Yelek
bind "scancode98"     "buy vesthelm"     // [0] Kask + Yelek
bind "scancode89"     "buy secondary1"   // [1] Pistol 2
bind "scancode90"     "buy secondary2"   // [2] Pistol 3
bind "scancode91"     "buy secondary3"   // [3] Pistol 4
bind "scancode92"     "buy midtier0"     // [4] Mid-Tier 1
bind "scancode93"     "buy midtier1"     // [5] Mid-Tier 2
bind "scancode94"     "buy midtier2"     // [6] Mid-Tier 3
bind "scancode95"     "buy rifle0"       // [7] Rifle 1
bind "scancode96"     "buy rifle1"       // [8] Rifle 2
bind "scancode97"     "buy rifle2"       // [9] Rifle 3

// [6] EKSTRA AYARLAR
cl_silencer_mode "1"             // Susturucuyu manuel tak/cikar
cl_use_opens_buy_menu "0"        // 'E' tusu satin alma menusunu acmasin
cl_scoreboard_mouse_enable_binding "+attack2" // Tablo acikken sag tik ile fareyi serbest birak

echo ">>> WOS0 Binds Settings Loaded (PRO EDITION) <<<"