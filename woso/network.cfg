// ##########################################################
// ##           WOS0 - NETWORK & LATENCY CONFIG            ##
// ##########################################################

// [1] BANT GENİŞLİĞİ (BANDWIDTH)
rate "1000000"                    // Maksimum veri akisi (Modern internet baglantilari icin en iyisi)

// [2] SUB-TICK & GECİKME ÖNLEME (LAG COMPENSATION)
// CS2'de mermilerin gec gitmesini ve input lag (girdi gecikmesi) olusmasini engeller.
cl_net_buffer_ticks "0"           // Paketleri bekletmeden isler (0 = En dusuk gecikme)
cl_net_buffer_ticks_use_interp "1" 
cl_tickpacket_desired_queuelength "0" // Siralama tamponunu sifirlar, aninda tepki verir

// [3] VURUŞ HİSSİYATI VE TAHMİN (PREDICTION)
// CS2'nin en onemli ayarlarindan biri. Vurdugun an kani ve sesi beklemeden sana gosterir.
cl_predict_body_shot_fx "1"       // Govde vuruslarinda kani aninda goster (Sunucuyu bekleme)
cl_predict_head_shot_fx "1"       // Headshot (Dink) sesini ve kivilcimi aninda goster
cl_predict_kill_ragdolls "0"      // Cesetlerin dusme animasyonunu sunucuya birak (Sahte olumleri engeller)

// [4] EŞLEŞTİRME VE BAĞLANTI (MATCHMAKING)
mm_dedicated_search_maxping "50"  // Rekabetcide aranan maksimum ping (40-50 arasi idealdir)
mm_csgo_community_search_players_min "3" // Topluluk sunucularinda en az 3 gercek oyuncu olsun
net_client_steamdatagram_enable_override "1" // En stabil Steam rotasini (SDR) zorla kullan
cl_resend "0.5"