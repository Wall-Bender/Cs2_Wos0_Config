// ##########################################################
// ##             WOS0 - AUDIO & SOUND CONFIG              ##
// ##########################################################

// [1] GENEL SES VE KULAKLIK (3D AUDIO)
volume "0.64"                     // Ana oyun ses seviyesi (Kendine gore ayarla)
snd_headphone_eq "0"              // EQ Ayari (0: Dogal ses, 1: Ayak seslerini tize ceker)
snd_spatialize_lerp "0.5"         // Sag-Sol ses izolasyonu dengesi
snd_steamaudio_enable_perspective_correction "1" // Seslerin dogru acidan gelmesini saglar
snd_steamaudio_reverb_level_db "-3" // Steam Audio yanki seviyesi
snd_mixahead "0.001"              // Ses motoru isleme suresi (Gecikmeyi onler, degistirme)
snd_autodetect_latency "1"

// [2] MÜZİK AYARLARI (REKABETÇİ ODAKLI)
// Odaklanmak icin gereksiz muzikler kapali, sadece taktiksel olanlar acik.
snd_menumusic_volume "0"       // Ana menu muzigi (Cok kisik)
snd_roundstart_volume "0"         // Raund baslangic muzigi (Kapali)
snd_roundend_volume "0"           // Raund bitis muzigi (Kapali)
snd_mapobjective_volume "0"       // Gorev muzigi (Kapali)
snd_deathcamera_volume "0"        // Olum kamerasi muzigi (Kapali)

// KRITIK AYARLAR:
snd_tensecondwarning_volume "0.12" // 10 SANIYE UYARISI: Bomba patlamadan 10 sn once calar (Cozme suresini hesaplamak icin sart)
snd_mvp_volume "0.12"             // Raund sonu MVP muzigi
snd_mute_mvp_music_live_players "1" // KRITIK: Raund bitse bile hala canli oyuncu varsa MVP muzigini calmaz (Ayak sesi kasmak icin)
snd_mute_losefocus "1"            // Alt-Tab atinca oyunu tamamen sessize alir

// [3] İLETİŞİM VE MİKROFON (VOICE)
snd_voipvolume "0.72"             // Takim arkadaslarinin genel ses seviyesi
cl_mute_enemy_team "0"            // Karsi takimi sustur (0: Kapali, 1: Acik)
cl_mute_all_but_friends_and_party "0" // Sadece arkadaslarin sesini ac
cl_clutch_mode "0"                // Clutch modu (Sona kalinca herkesi susturma - Su an kapali)
voice_modenable "1"               // Mikrofon sistemi aktif
voice_threshold "-110"            // Mikrofon algilama hassasiyeti
voice_always_sample_mic "0"

echo ">>> WOS0 Audio Settings Loaded <<<"