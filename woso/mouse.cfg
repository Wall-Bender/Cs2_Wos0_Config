// [1] HASSASİYET (SENSITIVITY)
sensitivity "1.5"                 // Kendi fare hizini (Sens) buraya gir
zoom_sensitivity_ratio "0.82"     // Durbun (AWP/Scout) hassasiyet orani

// [2] EKSEN HIZLARI (AXIS MULTIPLIERS)
// CS2'nin varsayilan motor ayarlaridir. Oynadigin cozunurluk (4:3 veya 16:9) ne olursa olsun bu degerleri 0.022'de birakmak kas hafizan icin en iyisidir.
m_pitch "0.022"                   // Dikey (Y-ekseni) hassasiyet carpani
m_yaw "0.022"                     // Yatay (X-ekseni) hassasiyet carpani

echo ">>> WOS0 Mouse Settings Loaded <<<"