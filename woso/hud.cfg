// ##########################################################
// ##              WOS0 - HUD & RADAR CONFIG               ##
// ##########################################################

// [1] GENEL ARAYÜZ (HUD)
hud_scaling "1"                   // HUD Boyutu (1: En buyuk, net gorunur)
cl_hud_color "5"                  // HUD Rengi (5: Mor - Klas ve dikkat cekici)
safezonex "0.97"                  // HUD'i ekranin kenarlarindan biraz iceri alir
safezoney "1"
cl_showloadout "1"                // Envanteri her zaman goster
r_show_build_info "0"             // Sol alttaki surum yazisini gizler

// [2] EKSTRA ARAYÜZ ŞOVLARI (ADVANCED HUD)
cl_weapon_selection_rarity_color "1" // Silah seciminde skinlerin nadirlik rengini parlat
cl_teamcounter_playercount_instead_of_avatars "1" // Ust barda profil fotograflari yerine sadece sayi goster
cl_teamid_overhead_fade_near_crosshair "0.5" // Arkadasina nisan alinca kafasindaki isim saydamlassin

// [3] RADAR (MINIMAP)
cl_hud_radar_scale "0"              // Normal radar boyutunu standart ve kibar hale getirir
cl_radar_scale "0.7"                // Normalde sadece senin YAKIN CEVRENI gosterir (Dikkat dagitmaz)
cl_radar_always_centered "1"        // Normalde seni haritanin merkezine koyar
cl_radar_rotate "1"                 // Baktigin yone gore radar doner
cl_radar_icon_scale_min "0.7"       // Radardaki oyuncu simgelerinin buyuklugu
cl_radar_square_with_scoreboard "0" // İŞTE BU! TAB'a bastiginda radar dev bir kare olur ve TUM HARITAYI gosterir!

// [4] TELEMETRİ (FPS & PING GÖSTERGELERİ)
cl_hud_telemetry_frametime_show "2" // FPS'i her zaman goster
cl_hud_telemetry_ping_show "2"      // Ping'i her zaman goster
cl_hud_telemetry_net_misdelivery_show "1" // Loss olursa goster
cl_hud_telemetry_frametime_poor "100" // 100 FPS alti kirmizi yanar
cl_hud_telemetry_ping_poor "60"       // 60 Ping ustu kirmizi yanar

// [5] SİLAH GÖRÜNÜMÜ (VIEWMODEL)
viewmodel_presetpos "1"           // Classic (Silahi kenara alir)
viewmodel_fov "60"                // Silahin gorus acisi (En genis)
viewmodel_offset_x "1"          
viewmodel_offset_y "1"
viewmodel_offset_z "-1"       
cl_prefer_lefthanded "0"          // Silahi sag elde tut

// [6] TAKIM VE İLETİŞİM
cl_color "1"                      // Lobideki ve radardaki kendi rengin (1: Mor)
cl_teammate_colors_show "1"       // Takim arkadaslarini farkli renklerde goster
cl_teamid_overhead_mode "3"       // [PRO] Takim arkadasinin ismini, canini VE BOMBALARINI goster (Duvar arkasi gorus)
cl_sanitize_player_names "0"      // Isimleri sansurleme
cl_hide_avatar_images "0"         // Profil fotograflarini goster
cl_mute_enemy_team "1"            // [PRO] Karsi takimin chatini tamamen kapatir (Odagini korur)

// [7] DİĞER (QoL)
con_enable "1"                    // Konsolu aktif et
ui_steam_overlay_notification_position "topright" // Steam bildirimlerini sag uste al

echo ">>> WOS0 HUD & Radar Settings Loaded (PRO PURPLE EDITION) <<<"